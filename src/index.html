<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Explore Earth through an interactive 3D globe and science-driven articles on climate, geology, oceanography, and astronomy."
    />
    <meta name="robots" content="index,follow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Explore Earth 3D Dashboard" />
    <meta
      property="og:description"
      content="Interactive Earth visualization with scientific article insights."
    />
    <meta property="og:image" content="assets/og-preview.png" />
    <meta
      property="og:url"
      content="https://michael-blake-donaldson.github.io/Earth-3D-Dashboard/src/index.html"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Explore Earth 3D Dashboard" />
    <meta
      name="twitter:description"
      content="Interactive Earth visualization with scientific article insights."
    />
    <meta name="twitter:image" content="assets/og-preview.png" />
    <title>3D Geographic Data Dashboard</title>
    <link rel="stylesheet" href="base.css" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://cdn.babylonjs.com" />
  </head>
  <body class="loading">
    <div id="page-loader" class="page-loader" aria-live="polite" aria-label="Loading">
      <div class="loader-core"></div>
      <p class="loader-text">Initializing planetary visualization...</p>
    </div>

    <header class="top-bar" aria-label="Utility menu">
      <nav class="top-nav">
        <a href="#" title="Cookies">COOKIES</a>
        <a href="#" title="Accessibility">ACCESSIBILITY</a>
        <a href="#" title="Audio" class="audio-icon">⬚⬚</a>
        <a href="#" title="Captions">CC</a>
      </nav>
    </header>

    <main class="app-container">
      <canvas
        id="renderCanvas"
        role="img"
        aria-label="3D Earth model - interactive planetary visualization"
      >
        Your browser does not support canvas. Open the Blog page for accessible article content.
      </canvas>

      <div class="hero-overlay">
        <div class="hero-content">
          <div class="logo-mark">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="50" cy="40" r="3" fill="currentColor" />
              <circle cx="45" cy="35" r="2" fill="currentColor" />
              <circle cx="55" cy="35" r="2" fill="currentColor" />
              <path d="M 35 55 Q 50 70 65 55" stroke="currentColor" fill="none" stroke-width="2" />
            </svg>
            <p class="logo-text">EXPLORE EARTH</p>
          </div>

          <h1 class="hero-headline">EARTH</h1>
          <p class="hero-subtitle">Interactive 3D Planetary Analysis</p>

          <button class="hero-cta" id="start-button">EXPLORE</button>
        </div>
      </div>

      <section id="controls-overlay" class="controls-overlay hidden" aria-label="Globe controls">
        <button class="close-controls" id="close-controls" aria-label="Close controls">✕</button>

        <section id="controls-dock" class="controls-dock" aria-label="Globe interaction controls">
          <div class="control-group" aria-label="Map mode controls">
            <p class="control-label">Map Mode</p>
            <div class="control-row">
              <button class="control-button" data-map-mode="day" type="button" aria-pressed="true">
                Day
              </button>
              <button
                class="control-button"
                data-map-mode="population"
                type="button"
                aria-pressed="false"
              >
                Population
              </button>
              <button
                class="control-button"
                data-map-mode="night"
                type="button"
                aria-pressed="false"
              >
                Night
              </button>
            </div>
          </div>

          <div class="control-group" aria-label="Mesh skin controls">
            <p class="control-label">Mesh Skin</p>
            <div class="control-row">
              <button
                class="control-button"
                data-skin-mode="realistic"
                type="button"
                aria-pressed="true"
              >
                Realistic
              </button>
              <button
                class="control-button"
                data-skin-mode="matte"
                type="button"
                aria-pressed="false"
              >
                Matte
              </button>
              <button
                class="control-button"
                data-skin-mode="wireframe"
                type="button"
                aria-pressed="false"
              >
                Wireframe
              </button>
            </div>
          </div>

          <div class="control-group" aria-label="Mesh geometry controls">
            <p class="control-label">Mesh Geometry</p>
            <div class="control-row">
              <button
                class="control-button"
                data-mesh-mode="sphere"
                type="button"
                aria-pressed="true"
              >
                Globe
              </button>
              <button
                class="control-button"
                data-mesh-mode="icosphere"
                type="button"
                aria-pressed="false"
              >
                Geodesic
              </button>
              <button
                class="control-button"
                data-mesh-mode="poly"
                type="button"
                aria-pressed="false"
              >
                Faceted
              </button>
            </div>
          </div>

          <div class="control-group" aria-label="Visual effect controls">
            <p class="control-label">Effects</p>
            <div class="control-row">
              <button
                class="control-button"
                data-effect="atmosphere"
                type="button"
                aria-pressed="true"
              >
                Atmosphere
              </button>
              <button class="control-button" data-effect="glow" type="button" aria-pressed="false">
                Glow
              </button>
              <button class="control-button" data-effect="spin" type="button" aria-pressed="false">
                Auto Spin
              </button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.babylonjs.com/babylon.js" defer></script>
    <script src="index.js" type="module"></script>
  </body>
</html>
